<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Kwetu Gallery Portal</title>
    <style>
        :root {
            --kwetu-teal: #009CA6;
            --kwetu-red: #ED1C24;
            --kwetu-black: #1a1a1a;
            --kwetu-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--kwetu-white);
            margin: 0;
            padding: 0;
            color: var(--kwetu-black);
        }

        /* Sticky Navigation Bar */
        .kwetu-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #eee;
            backdrop-filter: blur(5px);
        }

        .btn-back-home {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--kwetu-teal);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-back-home svg {
            margin-right: 8px;
            transition: transform 0.3s ease;
        }

        .btn-back-home:hover {
            color: var(--kwetu-red);
        }

        .btn-back-home:hover svg {
            transform: translateX(-5px);
        }

        .kwetu-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px 80px 20px;
            text-align: center;
        }

        /* Header Styling */
        .kwetu-header-box {
            margin-bottom: 50px;
            border-bottom: 3px solid var(--kwetu-teal);
            display: inline-block;
            padding-bottom: 10px;
        }

        .kwetu-header-box p {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            color: var(--kwetu-teal);
            margin-bottom: 5px;
        }

        .kwetu-header-box h2 {
            font-size: 2.8rem;
            margin: 0;
            color: var(--kwetu-black);
            text-transform: uppercase;
        }

        .kwetu-header-box h2 span {
            color: var(--kwetu-red);
        }

        /* Gallery Grid Layout */
        .kwetu-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .kwetu-item {
            position: relative;
            background: var(--kwetu-black);
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 3/2;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
        }

        .kwetu-item:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: var(--kwetu-teal);
        }

        .kwetu-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Instant Download Layer */
        .kwetu-dl-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 156, 166, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kwetu-item:hover .kwetu-dl-layer {
            opacity: 1;
        }

        .kwetu-dl-btn {
            background: var(--kwetu-white);
            padding: 15px;
            border-radius: 50%;
            display: flex;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .kwetu-dl-btn:hover {
            transform: scale(1.2);
            background: var(--kwetu-red);
        }

        .kwetu-dl-btn svg {
            width: 28px;
            height: 28px;
            fill: var(--kwetu-teal);
        }

        .kwetu-dl-btn:hover svg {
            fill: var(--kwetu-white);
        }

        @media (max-width: 600px) {
            .kwetu-grid-container {
                grid-template-columns: 1fr;
            }
            .kwetu-header-box h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
